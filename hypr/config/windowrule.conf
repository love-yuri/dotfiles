# ================================================
# 窗口规则 - 基础规则
# ================================================

# 禁止所有窗口最大化事件
windowrule = suppress_event maximize, match:class .*

# 忽略无标题的 XWayland 浮动窗口焦点
windowrule {
  name = nofocus-empty-xwayland
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  
  no_focus = on
}

# Kitty 飞行模式窗口
windowrule {
  name = fly-kitty
  match:title = ^(fly_is_kitty)$
  
  float = on
  center = on
  size = (monitor_w*0.6) (monitor_h*0.4)
}

# WPS 相关窗口平铺
windowrule = tile on, match:title ^(WPS)(.*)$

# 文件对话框浮动
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:title ^(Save As)(.*)$
windowrule = float on, match:title ^(Library)(.*)$

# MVI 窗口不获取焦点
windowrule = no_focus on, match:title ^(.*)(mvi)$

# ================================================
# 应用程序特定规则
# ================================================

# Clash Verge
windowrule {
  name = clash-verge
  match:class = clash-verge
  
  float = on
  center = on
  size = (monitor_w*0.7) (monitor_h*0.7)
}

# 网易云音乐
windowrule {
  name = netease-music
  match:class = netease-cloud-music
  
  float = on
  center = on
  size = (monitor_w*0.7) (monitor_h*0.7)
}

# YesPlayMusic
windowrule {
  name = yesplaymusic
  match:class = yesplaymusic
  
  float = on
  center = on
  size = (monitor_w*0.7) (monitor_h*0.7)
}

# Yuri
windowrule = float on, match:title yuri
windowrule = float on, match:class ^(yuri)$

# WPS 办公套件
windowrule = tile on, match:class wps
windowrule = tile on, match:class wpspdf
windowrule = tile on, match:class pdf
windowrule = tile on, match:class wpp

# Ark 压缩工具
windowrule = float on, match:title ^(Ark)$
windowrule = float on, match:class ^(Ark)$
windowrule = float on, match:class ^(org.kde.ark)$

# Rofi
windowrule = float on, match:title rofi.*

# Chatbox
windowrule = float on, match:class xyz.chatboxapp.app

# ================================================
# 透明度设置
# ================================================

windowrule = opacity 0.8 override 0.8 override, match:class ^(kitty)$
windowrule = opacity 0.92 override 0.91 override, match:class ^(code)$
windowrule = opacity 0.92 override 0.91 override, match:class ^(jetbrains-clion)$
windowrule = opacity 0.9 override 0.9 override, match:class ^(Typora)$
windowrule = opacity 1 override 1 override, match:class ^(google-chrome)$
windowrule = opacity 0.9 override 0.9 override, match:class ^(QQ)$

# ================================================
# 系统组件浮动设置
# ================================================

# Fcitx 输入法
windowrule = float on, match:class ^(.*fcitx.*)$

# KDE Polkit 认证
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$

# QQ
windowrule {
  name = qq-float
  match:class = ^(QQ)$
  
  float = on
  center = on
  size = (monitor_w*0.75) (monitor_h*0.75)
}

# KRuler 测量工具
windowrule = float on, match:class ^(kruler)$

# 图片查看器
windowrule {
  name = image-viewer
  match:title = ^(查看媒体)$|^(图片查看)$|^(图片查看器)$|^(KDE)$|^(打开文件.*)$
  
  float = on
  size = (monitor_w*0.7) (monitor_h*0.7)
}

# 预览窗口
windowrule = float on, match:title ^(预览)$

# 飞书
windowrule = float on, match:class ^(feishu)$

# Thunar 文件管理器
windowrule {
  name = thunar
  match:class = ^(Thunar)$
  
  float = on
  center = on
  size = (monitor_w*0.75) (monitor_h*0.75)
}

# XDG Desktop Portal
windowrule {
  name = xdg-portal
  match:class = ^(xdg-desktop-portal-gtk)$
  
  float = on
  size = (monitor_w*0.7) (monitor_h*0.7)
}

# IMV 图片查看器
windowrule = float on, match:class ^(imv)$

